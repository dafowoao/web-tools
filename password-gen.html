<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>密码生成器</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e0edf8;font-family:'Segoe UI','PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:1rem}
.card{background:#111827;border:1px solid #1f2a44;border-radius:16px;padding:2rem;max-width:460px;width:100%}
h1{font-size:1.3rem;color:#6b9eff;margin-bottom:.3rem;display:flex;align-items:center;gap:.4rem}
.sub{color:#5a6a80;font-size:.8rem;margin-bottom:1.2rem}
.pw-box{display:flex;background:#0d1322;border:1px solid #1f2a44;border-radius:8px;padding:.5rem .7rem;align-items:center;margin-bottom:1rem}
.pw-box input{flex:1;background:transparent;border:none;color:#e0edf8;font-size:1.5rem;font-family:monospace;outline:none;letter-spacing:2px}
.pw-box button{background:transparent;border:none;color:#6b9eff;cursor:pointer;font-size:1.1rem;padding:.3rem;transition:.2s}
.pw-box button:hover{color:#8bb4ff}
.strength{height:4px;border-radius:2px;margin-bottom:1.2rem;transition:.3s;width:0}
.row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.row:last-child{border:none}
.row label{color:#94a3b8;font-size:.85rem}
.row input[type=range]{width:100px;accent-color:#6b9eff}
.row .val{color:#e0edf8;font-size:.85rem;min-width:24px;text-align:right}
.toggle-l{display:flex;gap:.5rem;align-items:center}
.toggle-l input[type=checkbox]{accent-color:#6b9eff;width:16px;height:16px}
.gen-btn{width:100%;padding:.7rem;border:none;border-radius:8px;background:#6b9eff;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1rem;transition:.2s}
.gen-btn:hover{opacity:.85}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#34d399;color:#0a0e1a;padding:.4rem 1rem;border-radius:8px;font-size:.85rem;font-weight:600;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:400px){.card{padding:1.2rem}.pw-box input{font-size:1.1rem}}
</style></head>
<body>
<div class="card">
  <h1>🔐 密码生成器</h1>
  <div class="sub">强密码 · 一键复制</div>
  <div class="pw-box"><input id="pw" readonly value="P@ssw0rd!"><button onclick="copyPw()" title="复制">📋</button></div>
  <div class="strength" id="strength"></div>
  <div class="row"><label>密码长度</label><input type="range" min="4" max="64" value="16" id="len" oninput="gen()"><span class="val" id="lenV">16</span></div>
  <div class="row"><label>大写字母 A-Z</label><div class="toggle-l"><input type="checkbox" checked id="up"><span>26</span></div></div>
  <div class="row"><label>小写字母 a-z</label><div class="toggle-l"><input type="checkbox" checked id="low"><span>26</span></div></div>
  <div class="row"><label>数字 0-9</label><div class="toggle-l"><input type="checkbox" checked id="num"><span>10</span></div></div>
  <div class="row"><label>特殊符号 !@#$%</label><div class="toggle-l"><input type="checkbox" id="sym"><span>15</span></div></div>
  <div class="row"><label>排除相似字符</label><div class="toggle-l"><input type="checkbox" id="amb"></div></div>
  <button class="gen-btn" onclick="gen()">🔄 生成密码</button>
</div>
<div class="toast" id="toast">已复制</div>
<script>
const U='ABCDEFGHIJKLMNOPQRSTUVWXYZ',L='abcdefghijklmnopqrstuvwxyz',N='0123456789',S='!@#$%^&*()_+-=[]{}|;:,.<>?',AMB='0O1lI|';
function gen(){var c='',l=+document.getElementById('len').value;document.getElementById('lenV').textContent=l;
  if(document.getElementById('up').checked)c+=U;if(document.getElementById('low').checked)c+=L;
  if(document.getElementById('num').checked)c+=N;if(document.getElementById('sym').checked)c+=S;
  if(document.getElementById('amb').checked)for(var a of AMB)c=c.replaceAll(a,'');
  if(!c){document.getElementById('pw').value='请选择至少一个字符类型';return}
  var r='',arr=new Uint32Array(l);crypto.getRandomValues(arr);
  for(var i=0;i<l;i++)r+=c[arr[i]%c.length];
  document.getElementById('pw').value=r;updateStrength(r)}
function updateStrength(p){var s=0,sb=document.getElementById('strength');
  if(p.length>=8)s++;if(p.length>=14)s++;if(/[a-z]/.test(p)&&/[A-Z]/.test(p))s++;
  if(/\d/.test(p))s++;if(/[^a-zA-Z0-9]/.test(p))s++;
  var colors=['#ef4444','#f97316','#fbbf24','#6b9eff','#34d399','#10b981'];
  sb.style.width=(s/6*100)+'%';sb.style.background=colors[s];}
function copyPw(){var p=document.getElementById('pw');navigator.clipboard.writeText(p.value).then(()=>{
  var t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)})}
gen();
</script>
</body></html>
