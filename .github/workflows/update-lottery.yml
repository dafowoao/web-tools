name: 更新彩票数据

on:
  schedule:
    - cron: '0 14 * * *'   # 每天北京时间 22:00 运行
  workflow_dispatch:       # 也可手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 运行更新脚本
        run: python update_data.py
      
      - name: 提交更新
        run: |
          git config user.name "dafowoao"
          git config user.email "dafowoao@github.com"
          git add lottery_data.js
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "auto: 彩票数据自动更新 $(date +'%Y-%m-%d')"
          git push
