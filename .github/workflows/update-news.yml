name: 更新 AI 新闻

on:
  schedule:
    - cron: '0 */4 * * *'   # 每 4 小时更新一次
  workflow_dispatch:         # 可手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 获取 AI 新闻
        run: python update_news.py

      - name: 提交更新
        run: |
          git config user.name "dafowoao"
          git config user.email "dafowoao@github.com"
          git add ai-news.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "auto: AI 新闻更新 $(date +'%Y-%m-%d %H:%M')" && git push)
