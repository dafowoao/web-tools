<!DOCTYPE html>

<html lang="zh-CN">
<head><meta content="default-src 'none'; style-src * 'unsafe-inline'; script-src * 'unsafe-inline'; img-src * data: blob:; font-src * data:; media-src * data: blob:; connect-src 'none'; form-action 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'" http-equiv="Content-Security-Policy"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>武穴市三日天气预报桌面插件</title>
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/0915/3.4.17.js"></script>
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
<link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css" rel="stylesheet"/>
<style>
        /* Custom styles for glassmorphism and animations */
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .weather-card {
            transition: all 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }

        /* Animation for the icon */
        .weather-icon {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        /* Custom scrollbar if needed, though hidden by default */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="text-white">
<main class="glass-panel rounded-3xl p-8 w-full max-w-4xl mx-4 relative overflow-hidden">
<header class="flex justify-between items-center mb-8 border-b border-white/20 pb-4">
<div class="flex items-center space-x-3">
<i class="fa-solid fa-location-dot text-2xl text-blue-300"></i>
<div>
<h1 class="text-2xl font-bold tracking-wide">武穴市</h1>
<p class="text-sm text-blue-200 opacity-80">Wuxue City Weather</p>
</div>
</div>
<div class="text-right">
<div class="text-3xl font-light font-mono" id="current-time">00:00:00</div>
<div class="text-sm text-blue-200 opacity-80" id="current-date">Loading...</div>
</div>
</header>
<section class="grid grid-cols-1 md:grid-cols-3 gap-6">
<article class="weather-card bg-white/10 rounded-2xl p-6 flex flex-col items-center justify-between border border-white/10">
<div class="text-center w-full">
<h2 class="text-lg font-semibold mb-1">4月21日</h2>
<p class="text-xs text-blue-200 mb-4">星期二</p>
</div>
<div class="mb-4 relative">
<i class="fa-solid fa-cloud-showers-heavy text-6xl text-blue-300 weather-icon"></i>
<i class="fa-solid fa-cloud text-4xl text-gray-400 absolute top-2 -right-2 opacity-50"></i>
</div>
<div class="text-center mb-4">
<p class="text-xl font-medium">中雨转大雨</p>
</div>
<div class="flex justify-between w-full px-4 mb-4 text-sm">
<span class="flex flex-col items-center">
<i class="fa-solid fa-temperature-arrow-up text-red-300 mb-1"></i>
<span>27°</span>
</span>
<span class="flex flex-col items-center">
<i class="fa-solid fa-temperature-arrow-down text-blue-300 mb-1"></i>
<span>19°</span>
</span>
</div>
<div class="w-full pt-4 border-t border-white/10 flex items-center justify-center text-sm text-blue-100">
<i class="fa-solid fa-wind mr-2"></i>
<span>东风2级</span>
</div>
</article>
<article class="weather-card bg-white/10 rounded-2xl p-6 flex flex-col items-center justify-between border border-white/10">
<div class="text-center w-full">
<h2 class="text-lg font-semibold mb-1">4月22日</h2>
<p class="text-xs text-blue-200 mb-4">星期三</p>
</div>
<div class="mb-4 relative">
<i class="fa-solid fa-cloud-rain text-6xl text-blue-300 weather-icon" style="animation-delay: 0.5s;"></i>
</div>
<div class="text-center mb-4">
<p class="text-xl font-medium">大雨转小雨</p>
</div>
<div class="flex justify-between w-full px-4 mb-4 text-sm">
<span class="flex flex-col items-center">
<i class="fa-solid fa-temperature-arrow-up text-red-300 mb-1"></i>
<span>18°</span>
</span>
<span class="flex flex-col items-center">
<i class="fa-solid fa-temperature-arrow-down text-blue-300 mb-1"></i>
<span>12°</span>
</span>
</div>
<div class="w-full pt-4 border-t border-white/10 flex items-center justify-center text-sm text-blue-100">
<i class="fa-solid fa-wind mr-2"></i>
<span>东北风微风</span>
</div>
</article>
<article class="weather-card bg-white/10 rounded-2xl p-6 flex flex-col items-center justify-between border border-white/10">
<div class="text-center w-full">
<h2 class="text-lg font-semibold mb-1">4月23日</h2>
<p class="text-xs text-blue-200 mb-4">星期四</p>
</div>
<div class="mb-4 relative">
<i class="fa-solid fa-cloud-sun text-6xl text-yellow-300 weather-icon" style="animation-delay: 1s;"></i>
</div>
<div class="text-center mb-4">
<p class="text-xl font-medium">阴转晴</p>
</div>
<div class="flex justify-between w-full px-4 mb-4 text-sm">
<span class="flex flex-col items-center">
<i class="fa-solid fa-temperature-arrow-up text-red-300 mb-1"></i>
<span>32°</span>
</span>
<span class="flex flex-col items-center">
<i class="fa-solid fa-temperature-arrow-down text-blue-300 mb-1"></i>
<span>19°</span>
</span>
</div>
<div class="w-full pt-4 border-t border-white/10 flex items-center justify-center text-sm text-blue-100">
<i class="fa-solid fa-wind mr-2"></i>
<span>东南风3级</span>
</div>
</article>
</section>
<footer class="mt-6 text-center text-xs text-white/40">
<p>数据来源: [ba0_1] [ba0_2] [ba0_13] | 仅供参考</p>
</footer>
</main>
<script>
        // Update current time function
        function updateTime() {
            const now = new Date();
            
            // Format time HH:MM:SS
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;

            // Format date YYYY-MM-DD Weekday
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            
            document.getElementById('current-date').textContent = `${year}-${month}-${day} ${weekDay}`;
        }

        // Initialize clock
        updateTime();
        setInterval(updateTime, 1000);

        // Optional: Add a subtle parallax effect on mouse move for the background
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            document.body.style.backgroundPosition = `${x}px ${y}px`;
        });
    </script>
</body>
</html>
