<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 每日新闻</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0e1a;color:#e0edf8;font-family:-apple-system,'PingFang SC','Segoe UI',sans-serif;min-height:100vh}
.header{position:sticky;top:0;z-index:10;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.header h1{font-size:20px;font-weight:700;color:#6b9eff;display:flex;align-items:center;gap:8px}
.header .sub{font-size:11px;color:#5a6a80;margin-top:2px}
.header .sub span{color:#34d399}
.nav-tabs{display:flex;gap:4px;margin-top:10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:6px 14px;border-radius:16px;font-size:12px;white-space:nowrap;cursor:pointer;transition:.2s;color:#5a6a80;background:rgba(255,255,255,.04);border:1px solid transparent;flex-shrink:0}
.nav-tab.active{color:#6b9eff;background:rgba(107,158,255,.12);border-color:rgba(107,158,255,.25)}
.main{padding:12px 14px;max-width:800px;margin:0 auto}
.loading{text-align:center;padding:60px 0;color:#5a6a80;font-size:14px}
.loading .spinner{width:28px;height:28px;border:2px solid rgba(107,158,255,.15);border-top-color:#6b9eff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.news-card{background:#111827;border:1px solid #1f2a44;border-radius:14px;padding:14px;margin-bottom:10px;transition:.2s}
.news-card:active{transform:scale(.98)}
.news-card .source{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.news-card .source .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.news-card .source .name{font-size:11px;color:#5a6a80}
.news-card .source .time{font-size:10px;color:#3a4a60;margin-left:auto}
.news-card .title{font-size:15px;font-weight:600;line-height:1.45;color:#e0edf8;margin-bottom:6px}
.news-card .title a{color:#e0edf8;text-decoration:none}
.news-card .desc{font-size:12px;color:#6a7a90;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card .tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.news-card .tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(107,158,255,.1);color:#6b9eff}
.news-card .tag.hot{background:rgba(248,113,113,.1);color:#f87171}
.footer{text-align:center;padding:20px 0 30px;font-size:11px;color:#3a4a60}
.footer .upd{color:#34d399;font-size:11px}
.error-state{text-align:center;padding:40px 20px;color:#5a6a80}
.error-state .icon{font-size:40px;margin-bottom:12px}
.error-state .msg{font-size:14px;margin-bottom:12px}
.error-state .btn{padding:8px 20px;border:none;border-radius:8px;background:#6b9eff;color:#fff;font-size:13px;cursor:pointer}
.time-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:#34d399;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="header">
  <h1>📡 AI 每日新闻</h1>
  <div class="sub"><span class="time-dot"></span>自动更新 · <span id="updateInfo">加载中...</span></div>
  <div class="nav-tabs" id="navTabs">
    <div class="nav-tab active" data-cat="all">全部</div>
    <div class="nav-tab" data-cat="llm">大模型</div>
    <div class="nav-tab" data-cat="tools">工具</div>
    <div class="nav-tab" data-cat="research">研究</div>
    <div class="nav-tab" data-cat="industry">产业</div>
    <div class="nav-tab" data-cat="china">国内</div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在获取最新AI资讯...</div>
  </div>
</div>

<div class="footer">
  <div class="upd" id="footerInfo">数据每日自动更新</div>
  <div style="margin-top:4px">dafowoao.github.io/web-tools</div>
</div>

<script>
const CAT_NAMES = {all:'全部',llm:'大模型',tools:'工具',research:'研究',industry:'产业',china:'国内'};
let newsData = [];
let currentCat = 'all';

// 加载新闻数据
async function loadNews() {
  const el = document.getElementById('loading');
  try {
    const r = await fetch('ai-news.json?v=' + Date.now());
    const json = await r.json();
    if (!json.items || !json.items.length) throw new Error('无数据');
    newsData = json.items;
    document.getElementById('updateInfo').textContent = '更新于 ' + (json.updated || '今天');
    document.getElementById('footerInfo').textContent = '数据更新于 ' + (json.updated || '今天');
    renderNews('all');
  } catch(e) {
    el.innerHTML = '<div class="error-state"><div class="icon">📡</div><div class="msg">暂时无法获取新闻<br><span style="font-size:12px;color:#3a4a60">' + e.message + '</span></div><button class="btn" onclick="loadNews()">重试</button></div>';
  }
}

function renderNews(cat) {
  currentCat = cat;
  const el = document.getElementById('main');
  const items = cat === 'all' ? newsData : newsData.filter(n => n.category === cat);
  
  if (!items.length) {
    el.innerHTML = '<div class="error-state"><div class="msg">暂无该分类的新闻</div></div>';
    return;
  }
  
  const now = Date.now();
  let html = '';
  for (const n of items) {
    const ts = n.ts ? timeAgo(n.ts * 1000) : '';
    const srcColor = n.sourceColor || '#6b9eff';
    html += '<div class="news-card">' +
      '<div class="source">' +
        '<span class="dot" style="background:' + srcColor + '"></span>' +
        '<span class="name">' + esc(n.source || 'AI 资讯') + '</span>' +
        '<span class="time">' + ts + '</span>' +
      '</div>' +
      '<div class="title"><a href="' + esc(n.url || '#') + '" target="_blank" rel="noopener">' + esc(n.title) + '</a></div>' +
      (n.desc ? '<div class="desc">' + esc(n.desc) + '</div>' : '') +
      (n.tags ? '<div class="tags">' + n.tags.map(t => '<span class="tag' + (t === 'hot' ? ' hot' : '') + '">' + esc(t) + '</span>').join('') + '</div>' : '') +
    '</div>';
  }
  
  el.innerHTML = html;
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  return Math.floor(diff/86400) + '天前';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 分类切换
document.getElementById('navTabs').addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (!tab) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderNews(tab.dataset.cat);
});

loadNews();
</script>
</body>
</html>
