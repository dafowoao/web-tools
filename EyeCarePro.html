<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EyeCare Pro X · 科学护眼</title>
<style>
:root{
  --p:#5B8DE8;--p2:#83B0FF;--p3:#3D6BC8;--a:#6C5CE7;
  --bg:#F3F5F9;--card:#FFF;--sb:#191D2B;--t:#2C3E50;--t2:#7F8C8D;--t3:#BDC3C7;
  --b:#E6EAF0;--s:0 2px 12px rgba(0,0,0,0.04);--r:16px;
}
[data-theme="dark"]{
  --p:#83B0FF;--p2:#A8CCFF;--p3:#5B8DE8;
  --bg:#090C15;--card:#121622;--sb:#0B0E17;--t:#DDE4EC;--t2:#7B8390;--t3:#444B5A;
  --b:#1C2032;--s:0 2px 14px rgba(0,0,0,0.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);height:100vh;overflow:hidden;transition:background .35s,color .35s}
.app{display:flex;height:100vh}
.sb{width:195px;min-width:195px;background:var(--sb);display:flex;flex-direction:column;padding:20px 0;z-index:10}
.sb-l{padding:0 14px 18px;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.sb-l i{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--p),var(--a));display:flex;align-items:center;justify-content:center;font-size:13px;font-style:normal}
.sb-n{flex:1;padding:0 6px}
.sb-n button{display:flex;align-items:center;gap:7px;width:100%;padding:8px 11px;border-radius:8px;font-size:11px;color:rgba(255,255,255,0.45);background:none;border:none;cursor:pointer;transition:all .2s;font-family:inherit;text-align:left}
.sb-n button:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7)}
.sb-n button.ac{background:rgba(91,141,232,0.2);color:#fff;font-weight:600}
.sb-f{padding:10px 14px 0;border-top:1px solid rgba(255,255,255,0.04);margin:0 6px;display:flex;flex-direction:column;gap:3px}
.sb-f button{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:6px;font-size:10px;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;font-family:inherit}
.sb-f button:hover{color:rgba(255,255,255,0.55)}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:var(--card);border-bottom:1px solid var(--b);flex-shrink:0}
.tb h2{font-size:16px;font-weight:700}
.ct{flex:1;overflow:hidden;position:relative}
.pg{display:none;height:100%;position:relative}
.pg.on{display:flex;flex-direction:column}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.btn{padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-p{background:var(--p);color:#fff;box-shadow:0 3px 10px rgba(91,141,232,0.2)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(91,141,232,0.3)}
.btn-lg{padding:13px 28px;font-size:14px;border-radius:13px}
.btn-s{background:transparent;color:var(--t2);border:1px solid var(--b)}
.btn-s:hover{background:var(--bg);color:var(--t)}
.btn-xs{padding:4px 10px;font-size:10px;border-radius:6px}
.bof{position:fixed;inset:0;z-index:999;background:rgba(255,215,115,0);pointer-events:none;transition:background .8s}
.bof.on{background:rgba(255,215,115,0.12)}
.to{position:fixed;top:18px;right:18px;background:var(--card);border:1px solid var(--b);padding:11px 16px;border-radius:11px;box-shadow:0 5px 20px rgba(0,0,0,0.1);z-index:200;display:flex;align-items:center;gap:7px;font-size:11px;animation:si .35s;max-width:280px;opacity:0;pointer-events:none;transition:opacity .3s}
.to.sh{opacity:1;pointer-events:auto}
@keyframes si{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.g{display:grid;gap:10px}
.g2{grid-template-columns:repeat(2,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.cd{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px;box-shadow:var(--s);transition:all .3s}
.cd:hover{transform:translateY(-1px)}
.st{text-align:center;padding:10px 7px;background:var(--card);border-radius:11px;border:1px solid var(--b)}
.sv{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--p),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sl{font-size:9px;color:var(--t2);margin-top:1px}
.at{display:none;align-items:center;gap:7px;padding:7px 12px;background:var(--card);border:1px solid var(--b);border-radius:11px;margin-bottom:10px}
.at.on{display:flex}
.at-d{width:6px;height:6px;border-radius:50%;background:#27ae60;animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.2}}
.at-x{flex:1;font-size:10px;color:var(--t2)}
.at-s{font-size:9px;color:var(--p);font-weight:600}
.cv{position:absolute;inset:0;background:#000;overflow:hidden}
.cv canvas{display:block;width:100%;height:100%}
.cr{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.cp{padding:5px 11px;border-radius:16px;background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(255,255,255,0.07);cursor:pointer;font-size:10px;backdrop-filter:blur(8px);transition:all .25s;font-family:inherit}
.cp:hover{background:rgba(255,255,255,0.1)}
.cp.on{background:rgba(91,141,232,0.35);border-color:rgba(91,141,232,0.4)}
.lb{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;color:rgba(255,255,255,0.4);font-size:13px;font-weight:600;letter-spacing:2px;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,0.6)}
.pd{padding:18px 20px;overflow-y:auto;flex:1}
.pd::-webkit-scrollbar{width:3px}
.pd::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:3;pointer-events:none}
.ov-n{font-size:17px;font-weight:600;color:rgba(255,255,255,0.78);text-shadow:0 2px 10px rgba(0,0,0,0.5)}
.ov-d{font-size:10px;color:rgba(255,255,255,0.45);margin-top:5px}
.ov-p{font-size:10px;color:rgba(255,255,255,0.32);margin-top:3px}
@media(max-width:1100px){.sb{width:150px;min-width:150px}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sb{display:none}.g2{grid-template-columns:1fr}}
</style>        
</head>
<body>

<div class="bof" id="bf"></div>
<div class="to" id="to"><span id="ti"></span><span id="tm"></span></div>

<div class="app">
  <aside class="sb"><div class="sb-l"><i>👁</i>EyeCare Pro</div>
    <nav class="sb-n">
      <button class="ac" data-p="home">🏠 智能护眼</button>
      <button data-p="train">🎯 科学训练</button>
      <button data-p="relax">🌌 视觉放松</button>
      <button data-p="set">⚙ 设置</button>
    </nav>
    <div class="sb-f">
      <button onclick="A.toggleTheme()">🌙 主题</button>
      <button onclick="A.toggleBlue()">🛡 蓝光</button>
    </div>
  </aside>

  <main class="mn">
    <header class="tb">
      <h2 id="pt">智能护眼</h2>
      <div style="display:flex;gap:7px">
        <button class="btn btn-xs btn-s" id="fb" onclick="A.toggleFS()">⛶ 全屏</button>
        <button class="btn btn-p btn-lg" id="ab" onclick="M.toggle()">▶ 启动科学护眼</button>
      </div>
    </header>
    <div class="ct">
      <div class="pg on" id="page-home"><div class="pd">
        <div class="at" id="atb"><div class="at-d"></div><div class="at-x" id="ats"></div><div class="at-s" id="atss"></div></div>
        <div class="g g4" style="margin-bottom:10px">
          <div class="st"><div class="sv" id="sv1">0</div><div class="sl">今日休息</div></div>
          <div class="st"><div class="sv" id="sv2">0</div><div class="sl">护眼分钟</div></div>
          <div class="st"><div class="sv" id="sv3">0</div><div class="sl">训练次数</div></div>
          <div class="st"><div class="sv" id="sv4">1</div><div class="sl">连续天数</div></div>
        </div>
        <div class="g g2" style="margin-bottom:10px">
          <div class="cd" style="text-align:center"><div style="font-size:10px;color:var(--t2);margin-bottom:3px">距下次眼部放松</div><div style="font-size:44px;font-weight:300;letter-spacing:2px" id="cdt">20:00</div></div>
          <div class="cd" style="display:flex;align-items:center;justify-content:center;gap:10px"><div style="font-size:30px" id="mic">🔄</div><div><div style="font-size:13px;font-weight:600" id="mna">等待启动</div><div style="font-size:9px;color:var(--t2)" id="mde">点击上方按钮</div></div></div>
        </div>
        <div class="cv" style="position:relative;height:260px;border-radius:var(--r);overflow:hidden"><canvas id="hc"></canvas></div>
      </div></div>
      <div class="pg" id="page-train"><div class="cv" id="tp"><canvas id="tc"></canvas></div>
        <div class="cr" id="tcr">
          <button class="cp on" onclick="T.run('scan')">↔ 扫视</button>
          <button class="cp" onclick="T.run('track')">∞ 追踪</button>
          <button class="cp" onclick="T.run('focus')">🔍 聚焦</button>
          <button class="cp" onclick="T.run('full')">🎯 全套</button>
        </div>
        <div class="ov"><div class="ov-n" id="exn">选择训练项目</div><div class="ov-d" id="exd">点击下方按钮开始</div><div class="ov-p" id="exp"></div></div>
      </div>
      <div class="pg" id="page-relax"><div class="cv" id="rp"><canvas id="rc"></canvas></div>
        <div class="cr" id="rcr">
          <button class="cp on" onclick="R.switch(0)">🌊 深海</button>
          <button class="cp" onclick="R.switch(1)">🌈 极光</button>
          <button class="cp" onclick="R.switch(2)">💎 宝石</button>
          <button class="cp" onclick="R.switch(3)">🌀 银河</button>
          <button class="cp" onclick="R.switch(4)">🌋 熔岩</button>
          <button class="cp" onclick="R.switch(5)">❄️ 冰霜</button>
        </div>
        <div class="lb" id="rlb">深海之光</div>
      </div>
      <div class="pg" id="page-set"><div class="pd"><div class="cd" style="max-width:480px">
        <h3 style="font-size:11px;color:var(--t3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">⏱ 护眼参数</h3>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b)"><span style="font-size:11px">工作间隔(20-20-20)</span><div style="display:flex;align-items:center;gap:5px"><input type="range" min="15" max="60" value="20" step="5" id="sw" oninput="A.upSet()" style="width:110px"><span id="swv" style="font-weight:600;color:var(--p);min-width:40px;font-size:11px">20分钟</span></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b)"><span style="font-size:11px">休息时长</span><div style="display:flex;align-items:center;gap:5px"><input type="range" min="20" max="120" value="30" step="5" id="sb" oninput="A.upSet()" style="width:110px"><span id="sbv" style="font-weight:600;color:var(--p);min-width:40px;font-size:11px">30秒</span></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><span style="font-size:11px">蓝光过滤</span><div style="display:flex;align-items:center;gap:5px"><input type="range" min="5" max="30" value="12" step="1" id="sbl" oninput="A.upBlue()" style="width:110px"><span id="sblv" style="font-weight:600;color:var(--p);min-width:40px;font-size:11px">12%</span></div></div>
      </div></div></div>
    </div>
  </main>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const Q=id=>document.getElementById(id);

// ====== App ======
const A={theme:'light',blue:false,bv:12,w:20,br:30,bks:0,mn:0,ex:0,stk:1,cd:1200,
  init(){this.theme=localStorage.getItem('e6t')||'light';this.bv=+localStorage.getItem('e6bv')||12;this.w=+localStorage.getItem('e6w')||20;this.br=+localStorage.getItem('e6br')||30;this.stk=+localStorage.getItem('e6s')||1;this.bks=+sessionStorage.getItem('e6b')||0;this.mn=+sessionStorage.getItem('e6m')||0;this.ex=+sessionStorage.getItem('e6e')||0;document.documentElement.setAttribute('data-theme',this.theme);Q('sw').value=this.w;Q('sb').value=this.br;Q('sbl').value=this.bv;this.upSet();this.upBlue();this.upSt();this.upCd()},
  sv(){localStorage.setItem('e6t',this.theme);localStorage.setItem('e6bv',this.bv);localStorage.setItem('e6w',this.w);localStorage.setItem('e6br',this.br);localStorage.setItem('e6s',this.stk);sessionStorage.setItem('e6b',this.bks);sessionStorage.setItem('e6m',this.mn);sessionStorage.setItem('e6e',this.ex)},
  toggleTheme(){this.theme=this.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',this.theme);this.sv()},
  toggleBlue(){this.blue=!this.blue;Q('bf').classList.toggle('on',this.blue);this.upBlue()},
  upBlue(){this.bv=+Q('sbl').value;Q('sblv').textContent=this.bv+'%';if(this.blue)Q('bf').style.background=`rgba(255,215,115,${this.bv/100})`;this.sv()},
  upSet(){this.w=+Q('sw').value;this.br=+Q('sb').value;Q('swv').textContent=this.w+'分钟';Q('sbv').textContent=this.br+'秒';this.cd=this.w*60;this.upCd();M.resetCd();this.sv()},
  upSt(){Q('sv1').textContent=this.bks;Q('sv2').textContent=this.mn;Q('sv3').textContent=this.ex;Q('sv4').textContent=this.stk},
  upCd(){const m=Math.floor(this.cd/60),s=this.cd%60;Q('cdt').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')},
  toast(msg,i='💡'){const t=Q('to');Q('ti').textContent=i;Q('tm').textContent=msg;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2600)},
  toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen()},
  nav(p){document.querySelectorAll('.sb-n button').forEach(b=>b.classList.remove('ac'));document.querySelector(`[data-p="${p}"]`).classList.add('ac');document.querySelectorAll('.pg').forEach(pg=>pg.classList.remove('on'));Q('page-'+p).classList.add('on');Q('pt').textContent={home:'智能护眼',train:'科学训练',relax:'视觉放松',set:'设置'}[p];
    if(p==='relax'){R.on=true;R.start()}else R.on=false;
    if(p==='home')H.start();
    if(p==='train'){T.start();T.resize()}
    if(p==='set')A.upSet()},
  fr(){setTimeout(()=>window.dispatchEvent(new Event('resize')),80)}};

// ====== Auto ======
const M={t:null,on:false,
  toggle(){this.on?this.stop():this.start()},
  resetCd(){A.cd=A.w*60;A.upCd()},
  start(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});this.on=true;this.resetCd();Q('ab').textContent='⏸ 停止';Q('atb').classList.add('on');Q('ats').textContent='科学护眼运行中';Q('atss').textContent='⏱ '+A.w+'分钟';Q('mic').textContent='⏱';Q('mna').textContent='专注工作';Q('mde').textContent=A.w+'分钟后自动提醒';T.lock(true);this.tick()},
  stop(){this.on=false;clearTimeout(this.t);Q('ab').textContent='▶ 启动科学护眼';Q('atb').classList.remove('on');Q('mic').textContent='🔄';Q('mna').textContent='已停止';Q('mde').textContent='点击上方按钮重新启动';T.lock(false);T.stop()},
  tick(){if(!this.on)return;A.cd--;A.upCd();if(A.cd<=0){this.doit()}else{this.t=setTimeout(()=>this.tick(),1000)}},
  async doit(){A.bks++;A.mn+=Math.ceil(A.br/60);A.sv();A.upSt();Q('atss').textContent='🎯 训练中';Q('ats').textContent='基于眼球运动科学的训练';Q('mic').textContent='🎯';Q('mna').textContent='眼部训练';Q('mde').textContent='20-20-20+追踪+聚焦';A.nav('train');await new Promise(r=>setTimeout(r,300));await T.runAuto();Q('atss').textContent='🌌 放松中';Q('ats').textContent='降低视觉皮层兴奋度';A.nav('relax');await new Promise(r=>setTimeout(r,A.br*1000));this.resetCd();A.upCd();Q('atss').textContent='⏱ '+A.w+'分钟';Q('ats').textContent='科学护眼运行中';Q('mic').textContent='⏱';Q('mna').textContent='专注工作';Q('mde').textContent=A.w+'分钟后自动提醒';A.nav('home');A.toast('✅ 护眼周期完成！','✅');this.tick()}};

// ====== Nav ======
document.querySelectorAll('.sb-n button').forEach(b=>b.addEventListener('click',()=>A.nav(b.dataset.p)));
document.addEventListener('keydown',e=>{if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey&&!e.target.closest('input,textarea,select'))A.toggleFS()});
document.addEventListener('fullscreenchange',()=>{const b=Q('fb');if(document.fullscreenElement){b.innerHTML='⛶ 退出';b.className='btn btn-p btn-xs'}else{b.innerHTML='⛶ 全屏';b.className='btn btn-xs btn-s'}A.fr()});
window.addEventListener('resize',()=>{H.resize();T.resize();R.resize()});

// ====== Helpers ======
function mkScene(){return new THREE.Scene()}
function mkLight(s,i=0.5){if(!s)return;s.add(new THREE.AmbientLight(0x151533,i))}
function mkKey(s,i=2.5){if(!s)return null;const l=new THREE.DirectionalLight(0x8899bb,i);l.position.set(6,10,12);s.add(l);return l}
function mkFill(s,i=1.5){if(!s)return null;const l=new THREE.DirectionalLight(0x445577,i);l.position.set(-5,-3,-6);s.add(l);return l}
function mkPoint(s,c,i,r,x,y,z){if(!s)return null;const l=new THREE.PointLight(c,i,r);l.position.set(x,y,z);s.add(l);return l}

// ====== Home 3D ======
const H={s:null,ca:null,rd:null,gr:null,tm:0,done:false,
  start(){if(!this.done){const w=Q('hc').parentElement.clientWidth;if(w<1){setTimeout(()=>this.start(),100);return}this.done=true;this.init()}else this.resize()},
  init(){const c=Q('hc'),w=c.parentElement.clientWidth,h=c.parentElement.clientHeight;console.log('[H]',w,h);if(w<1||h<1){this.done=false;return}c.width=w*Math.min(devicePixelRatio,2);c.height=h*Math.min(devicePixelRatio,2);this.s=mkScene();this.ca=new THREE.PerspectiveCamera(50,w/h,0.3,100);this.ca.position.z=15;this.rd=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true});this.rd.setSize(w,h);this.rd.setPixelRatio(Math.min(devicePixelRatio,2));this.rd.toneMapping=THREE.ACESFilmicToneMapping;this.rd.toneMappingExposure=1.1;this.gr=new THREE.Group();this.s.add(this.gr);mkLight(this.gr,0.55);mkKey(this.gr,2.3);mkFill(this.gr,1.2);mkPoint(this.gr,0x6688cc,6,24,5,3,5);
  for(let i=0;i<45;i++){const r=0.15+Math.random()*0.4;const g=new THREE.SphereGeometry(r,48,48);const m=new THREE.Mesh(g,new THREE.MeshPhysicalMaterial({color:0x8899bb,roughness:0.06,metalness:0.06,clearcoat:0.4,specularIntensity:0.85}));const a=(i/45)*Math.PI*2,d=3.2+Math.random()*5.5;m.position.set(Math.cos(a)*d,(Math.random()-0.5)*9,Math.sin(a)*d);m.userData={a,d,by:m.position.y,sp:0.12+Math.random()*0.3,os:0.15+Math.random()*0.3,oa:Math.random()*2.2};this.gr.add(m)}
  const r1=new THREE.Mesh(new THREE.TorusGeometry(5.8,0.035,16,100),new THREE.MeshBasicMaterial({color:0x7799cc,transparent:true,opacity:0.25}));this.gr.add(r1);r1.userData={r:true};
