<title>2026世界杯 · 全程赛程 & 冠军预测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050810;--surface:#0a0f1e;--card:#0f172a;--card2:#131e33;--border:#1a2d4a;--border2:#2a3d5e;--text:#e0edf8;--muted:#94a3b8;--accent:#6b9eff;--gold:#ffbf00;--green:#34d399;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;--cyan:#38bdf8;--pink:#f472b6}
html{background:var(--bg);display:flex;justify-content:center;padding:1rem}
body{width:100%;max-width:2540px;background:var(--surface);border-radius:20px;padding:2rem 2.5rem;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:16px;color:var(--text);line-height:1.6;box-shadow:0 0 120px rgba(107,158,255,.04),inset 0 1px 0 rgba(255,255,255,.02)}
/* 头部 */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:0.5rem}
.header .title{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:0.6rem}
.header .title small{font-size:0.9rem;background:none;-webkit-text-fill-color:var(--muted);font-weight:400}
.header .meta{display:flex;gap:1.2rem;font-size:0.8rem;color:var(--muted)}
h2{font-size:1.2rem;color:var(--accent);margin:1.2rem 0 0.6rem;display:flex;align-items:center;gap:0.5rem;font-weight:700}
h2::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
h3{font-size:1rem;color:var(--gold);margin:0.8rem 0 0.4rem}
/* 网格 */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:0.8rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;margin-bottom:0.8rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:0.8rem}
/* 卡片 */
.card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;transition:all .3s;height:100%}
.card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card .ctitle{font-size:0.8rem;font-weight:700;color:var(--accent);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}
/* 分组 */
.groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.7rem;margin-bottom:0.8rem}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.6rem 0.8rem;transition:all .2s}
.group-card:hover{border-color:var(--border2)}
.group-card .gtitle{font-weight:700;font-size:0.8rem;color:var(--accent);margin-bottom:0.25rem;display:flex;justify-content:space-between}
.group-card .gtitle .gdate{color:var(--muted);font-size:0.65rem;font-weight:400}
.group-card .team{display:flex;align-items:center;gap:0.3rem;padding:0.12rem 0;font-size:0.78rem;border-radius:4px;transition:all .15s}
.group-card .team:hover{background:rgba(255,255,255,.02)}
.group-card .team .flag{font-size:0.9rem;min-width:1.2rem;text-align:center}
.group-card .team .name{flex:1}
.group-card .team .pts{color:var(--muted);font-size:0.65rem;min-width:1.8rem;text-align:right}
.group-card .team .str{height:3px;border-radius:2px;background:var(--border);flex:0 0 100%;margin-top:1px}
.group-card .team .str .fill{height:100%;border-radius:2px}
/* 实力排名 */
.rank-card{display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.5rem;border-radius:6px;margin:0.15rem 0;transition:all .2s;font-size:0.82rem}
.rank-card:hover{background:rgba(255,255,255,.02)}
.rank-card .num{color:var(--muted);font-size:0.7rem;min-width:1.2rem;font-weight:600}
.rank-card .rname{flex:1;font-weight:600}
.rank-card .score{font-weight:700;min-width:2rem;text-align:right}
.rank-card .bar{width:4rem;height:4px;background:var(--border);border-radius:2px;margin-left:0.3rem}
.rank-card .bar .fill{height:100%;border-radius:2px}
/* 比赛卡片 */
.match-card{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.5rem;border-radius:6px;margin:0.15rem 0;font-size:0.82rem;transition:all .15s}
.match-card:hover{background:rgba(255,255,255,.02)}
.match-card .time{color:var(--muted);min-width:3rem;font-size:0.7rem}
.match-card .vsteam{flex:1;text-align:center}
.match-card .vs-score{color:var(--gold);font-weight:700;min-width:1.8rem;text-align:center}
.match-card .round-tag{color:var(--accent);font-size:0.65rem;min-width:2.5rem}
/* 淘汰赛可视化 */
.knockout{display:flex;justify-content:space-around;gap:0.5rem;padding:0.5rem 0;flex-wrap:wrap}
.knockout .round-box{flex:1;min-width:10rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.5rem}
.knockout .round-box .rtitle{font-size:0.7rem;color:var(--muted);text-align:center;margin-bottom:0.3rem}
.knockout .ko-match{display:flex;align-items:center;gap:0.3rem;padding:0.2rem 0;font-size:0.75rem;border-bottom:1px solid rgba(30,45,74,.3)}
.knockout .ko-match:last-child{border-bottom:none}
.ko-match .ko-t1{flex:1;text-align:right}
.ko-match .ko-t2{flex:1}
.ko-match .ko-score{color:var(--gold);font-weight:700;min-width:1.5rem;text-align:center;font-size:0.75rem}
.ko-win{color:var(--green);font-weight:600}
.ko-lose{color:var(--muted)}
/* 冠军 */
.champion-box{background:linear-gradient(135deg,rgba(255,191,0,.08),rgba(255,191,0,.02));border:2px solid rgba(255,191,0,.2);border-radius:14px;padding:1rem 1.5rem;text-align:center;margin-top:0.5rem}
.champion-box .cup{font-size:3rem;margin-bottom:0.3rem}
.champion-box .cname{font-size:1.5rem;font-weight:800;color:var(--gold)}
.champion-box .cpath{display:flex;justify-content:center;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap}
.champion-box .cpath .step{font-size:0.75rem;color:var(--muted);padding:0.3rem 0.6rem;background:var(--card);border-radius:6px;border:1px solid var(--border)}
/* 赛季统计 */
.stat-row{display:flex;justify-content:space-between;padding:0.2rem 0;font-size:0.8rem;border-bottom:1px solid rgba(30,45,74,.2)}
.stat-row .slabel{color:var(--muted)}
.stat-row .svalue{color:var(--text);font-weight:600}
/* 渐变 */
.gold-text{color:var(--gold)}
.green-text{color:var(--green)}
.accent-text{color:var(--accent)}
.team-s{color:#34d399}
.team-a{color:#6b9eff}
.team-b{color:#fb923c}
.team-c{color:#94a3b8}
/* 响应式 */
@media(max-width:1920px){body{padding:1.5rem 2rem}}
@media(max-width:1440px){.groups-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:1024px){.groups-grid{grid-template-columns:repeat(2,1fr)}.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.knockout{flex-direction:column}}
@media(max-width:768px){body{padding:0.8rem 1rem;font-size:14px}.groups-grid,.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}
</style>

function predict(t1,t2){
  const d=t1.strength-t2.strength;
  const h1=t1.home||70,h2=t2.home||70;
  const net=d+(h1-h2)/10;
  if(net>8)return{t1,t2,s1:2,s2:0,w:t1};
  if(net>4)return{t1,t2,s1:2,s2:0,w:t1};
  if(net>1)return{t1,t2,s1:2,s2:1,w:t1};
  if(net>-2)return{t1,t2,s1:1,s2:1,w:null};
  if(net>-5)return{t1,t2,s1:1,s2:2,w:t2};
  if(net>-9)return{t1,t2,s1:0,s2:2,w:t2};
  return{t1,t2,s1:0,s2:3,w:t2};
}

        const medal=i===0?'🥇':i===1?'🥈':'';
        return `<div class="team">
          <span style="font-size:0.8rem">${medal}</span>
          <span style="font-size:0.9rem">${flag}</span>
          <span class="name" style="color:${color};font-weight:${i<2?'600':'400'}">${t.name}</span>
          <span class="pts" style="color:${i<2?'var(--gold)':'var(--muted)'}">${t.strength}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderStrength(){
  const el=document.getElementById('strengthGrid');
  const all=Object.entries(TEAMS).sort((a,b)=>b[1].strength-a[1].strength).slice(0,15);
  const maxStr=all[0][1].strength;
  el.innerHTML=all.map(([name,data],i)=>{
    const pct=data.strength/maxStr*100;
    const color=data.strength>90?'var(--green)':data.strength>82?'var(--accent)':data.strength>75?'var(--gold)':'var(--muted)';
    return `<div class="rank-card">
      <span class="num" style="color:${i<3?'var(--gold)':'var(--muted)'}">${i+1}</span>
      <span style="font-size:0.9rem">${data.flag}</span>
      <span class="rname" style="color:${color}">${name}</span>
      <div class="bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="score" style="color:${color}">${data.strength}</span>
    </div>`;
  }).join('');
}

function renderKnockout(){
  const winners=GROUPS.map(g=>top2(g));
  const all3rds=GROUPS.map(g=>{
    const s=[...g.teams].sort((a,b)=>b.strength-a.strength);
    return s[2];
  }).sort((a,b)=>b.strength-a.strength).slice(0,8);

  // 16强
  const r32=[
    predict(winners[0][0],all3rds[2]),
    predict(winners[1][0],all3rds[5]),
    predict(winners[4][0],winners[7][1]),
    predict(winners[8][0],winners[11][1]),
    predict(winners[5][0],all3rds[1]),
    predict(winners[9][0],winners[10][1]),
    predict(winners[2][0],all3rds[7]),
    predict(winners[3][0],all3rds[6]),
    predict(winners[6][0],all3rds[3]),
    predict(winners[10][0],winners[9][1]),
    predict(winners[11][0],winners[8][1]),
    predict(winners[0][1],winners[1][1]),
    predict(winners[2][1],winners[3][1]),
    predict(winners[4][1],winners[5][1]),
    predict(winners[6][1],winners[7][1]),
    predict(all3rds[0],all3rds[4]),
  ];

  // 8强
  const r16=[];
  for(let i=0;i<r32.length;i+=2)r16.push(predict(r32[i].w||r32[i].t1,r32[i+1].w||r32[i+1].t1));

  // 4强
  const r8=[];
  for(let i=0;i<r16.length;i+=2)r8.push(predict(r16[i].w||r16[i].t1,r16[i+1].w||r16[i+1].t1));

  // 决赛
  const final=predict(r8[0].w||r8[0].t1,r8[1].w||r8[1].t1);
  const champion=final.w||final.t1;

  const el=document.getElementById('knockoutView');
  el.innerHTML=`
    <div class="round-box">
      <div class="rtitle">1/16决赛 · 32→16</div>
      ${r32.map(m=>`<div class="ko-match">
        <span class="ko-t1 ${(m.w||m.t1)===m.t1?'ko-win':'ko-lose'}">${m.t1.name}</span>
        <span class="ko-score">${m.s1}:${m.s2}</span>
        <span class="ko-t2 ${(m.w||m.t1)===m.t2?'ko-win':'ko-lose'}">${m.t2.name}</span>
      </div>`).join('')}
    </div>
    <div class="round-box">
      <div class="rtitle">1/8决赛 · 16→8</div>
      ${r16.map(m=>`<div class="ko-match">
        <span class="ko-t1 ${(m.w||m.t1)===m.t1?'ko-win':'ko-lose'}">${m.t1.name}</span>
        <span class="ko-score">${m.s1}:${m.s2}</span>
        <span class="ko-t2 ${(m.w||m.t1)===m.t2?'ko-win':'ko-lose'}">${m.t2.name}</span>
      </div>`).join('')}
    </div>
    <div class="round-box" style="border-color:rgba(107,158,255,.2)">
      <div class="rtitle">1/4决赛 · 8→4</div>
      ${r8.map(m=>`<div class="ko-match">
        <span class="ko-t1 ${(m.w||m.t1)===m.t1?'ko-win':'ko-lose'}">${m.t1.name}</span>
        <span class="ko-score">${m.s1}:${m.s2}</span>
        <span class="ko-t2 ${(m.w||m.t1)===m.t2?'ko-win':'ko-lose'}">${m.t2.name}</span>
      </div>`).join('')}
    </div>
    <div class="round-box" style="border-color:rgba(255,191,0,.3)">
      <div class="rtitle" style="color:var(--gold)">🏆 决赛</div>
      <div style="text-align:center;padding:0.5rem 0">
        <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;font-size:0.9rem;font-weight:700">
          <span>${final.t1.name}</span>
          <span style="color:var(--gold);font-size:1.2rem">${final.s1}:${final.s2}</span>
          <span>${final.t2.name}</span>
        </div>
        <div style="margin-top:0.5rem;font-size:1.2rem;font-weight:800;color:var(--gold)">🏆 ${champion.name}</div>
      </div>
    </div>
  `;

  const champEl=document.getElementById('championView');
  champEl.innerHTML=`
    <div class="champion-box">
      <div class="cup">🏆</div>
      <div class="cname">${champion.name}</div>
      <div style="color:var(--muted);font-size:0.85rem;margin-top:0.2rem">2026 FIFA 世界杯 · 冠军</div>
      <div class="cpath">
        <div class="step">小组第1</div>
        <div class="step">1/16 ✓</div>
        <div class="step">1/8 ✓</div>
        <div class="step">1/4 ✓</div>
        <div class="step">半决赛 ✓</div>
        <div class="step" style="border-color:var(--gold);color:var(--gold)">🏆 决赛胜</div>
      </div>
      <div style="margin-top:0.6rem;font-size:0.8rem;color:var(--muted)">
        📅 7月19日 · 大都会人寿体育场 · 新泽西/纽约
      </div>
      <div id="predictReason" style="margin-top:0.5rem;text-align:left;font-size:0.8rem;color:var(--muted);line-height:1.6"></div>
    </div>
  `;

  const reasonEl=document.getElementById('predictReason');
  const champInfo=TEAMS[champion.name];
  const runnerUp=final.t1===champion?final.t2:final.t1;
  reasonEl.innerHTML=`
    <b style="color:var(--accent)">🔍 预测依据：</b><br>
    • ${champion.name}：综合实力评分${champInfo?champInfo.strength:'—'}分，本届最高之一<br>
    • 攻防平衡、阵容深度、大赛经验均占优<br>
    • 淘汰赛路径相对平稳，8强前避开顶级对手<br>
    • 决赛预测 ${champion.name} ${final.s1}:${final.s2} ${runnerUp}<br>
    • ⚠️ 足球最大魅力在于不确定性——冷门随时可能发生
  `;
}

renderStrength();
renderKeyMatches();
renderKnockout();
</script>
